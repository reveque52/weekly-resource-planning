<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weekly Resource Planning</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <section id="loginScreen" class="login-screen">
      <div class="login-panel">
        <div class="brand login-brand">
          <img class="brand-logo" src="assets/fit-global-logo.jpg" alt="FIT Global SAP Silver Partner">
          <div>
            <h1>Weekly Planning</h1>
            <p>Resource allocation</p>
          </div>
        </div>
        <form id="loginForm" class="login-form" autocomplete="on">
          <label>
            <span>User name or email</span>
            <input id="loginIdentity" name="username" autocomplete="username" placeholder="admin@company.local">
          </label>
          <label>
            <span>Password</span>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="Password disabled for now" disabled>
          </label>
          <p id="loginMessage" class="login-message"></p>
          <button type="submit">Sign in</button>
          <div class="login-links">
            <button id="forgotPasswordButton" type="button">Forgot password</button>
            <button id="changePasswordButton" type="button">Change password</button>
          </div>
        </form>
      </div>
    </section>

    <div id="appShell" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand">
          <img class="brand-logo" src="assets/fit-global-logo.jpg" alt="FIT Global SAP Silver Partner">
          <div>
            <h1>Weekly Planning</h1>
            <p>Resource allocation</p>
          </div>
        </div>

        <label class="field">
          <span>Week</span>
          <div class="week-picker">
            <button id="prevWeekButton" type="button" title="Previous week">&lt;</button>
            <select id="weekSelect"></select>
            <button id="nextWeekButton" type="button" title="Next week">&gt;</button>
          </div>
          <button id="newWeekButton" class="sidebar-action" type="button">New week from draft</button>
          <button id="clearWeekButton" class="sidebar-action danger" type="button">Delete latest week</button>
        </label>

        <label class="field">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Name, Jira, project">
        </label>

        <label class="field">
          <span>Role</span>
          <select id="roleSelect"></select>
        </label>

        <label class="field">
          <span>Project</span>
          <select id="projectSelect"></select>
        </label>

        <div class="metric-stack">
          <button id="resourceMetric" class="metric metric-button" type="button">
            <strong id="resourceCount">0</strong>
            <span>resources</span>
          </button>
          <div class="metric">
            <strong id="assignmentCount">0</strong>
            <span>half-day slots</span>
          </div>
          <button id="projectMetric" class="metric metric-button" type="button">
            <strong id="projectCount">0</strong>
            <span>projects</span>
          </button>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="updatedText">Updated</p>
            <h2 id="pageTitle">Resource Plan</h2>
          </div>
          <div class="topbar-actions">
            <div class="view-tabs" role="tablist" aria-label="Views">
              <button class="active" id="gridTab" type="button" aria-label="Grid" title="Grid"><svg class="tab-icon" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" focusable="false"><path d="M3 10.5 12 3l9 7.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
              <button id="summaryTab" type="button">Summary</button>
              <button id="personSummaryTab" type="button">Person Summary</button>
              <button id="projectReportTab" type="button">Project Report</button>
              <button id="orgTab" type="button">Organization</button>
            </div>
            <div class="user-menu">
              <button id="approveWeekButton" class="approve-button hidden" type="button">Approve draft</button>
              <button id="currentUserButton" type="button"></button>
              <button id="logoutButton" type="button">Sign out</button>
            </div>
          </div>
        </header>

        <section id="gridView" class="planning-panel">
          <div class="table-wrap">
            <table class="planning-table">
              <thead id="planningHead"></thead>
              <tbody id="planningBody"></tbody>
            </table>
          </div>
        </section>

        <section id="summaryView" class="summary-panel hidden">
          <div class="summary-layout">
            <div>
              <h3>Project Load</h3>
              <div id="projectBars" class="bars"></div>
            </div>
            <div>
              <h3>Role Split</h3>
              <div id="roleBars" class="bars compact"></div>
            </div>
          </div>
        </section>

        <section id="personSummaryView" class="summary-panel hidden">
          <div class="person-summary-toolbar">
            <label>
              <span>Person</span>
              <select id="personSummarySelect"></select>
            </label>
            <label>
              <span>Period</span>
              <select id="personPeriodSelect">
                <option value="week">Weekly</option>
                <option value="month">Monthly</option>
                <option value="year">Yearly</option>
              </select>
            </label>
          </div>

          <div class="person-summary-layout">
            <div class="pie-card">
              <div id="personPie" class="pie-chart"></div>
              <div>
                <p class="eyebrow" id="personSummaryMeta"></p>
                <h3 id="personSummaryTitle">Person Load</h3>
                <p id="personSummaryTotal" class="summary-total"></p>
              </div>
            </div>
            <div>
              <h3>Time Distribution</h3>
              <div id="personLegend" class="pie-legend"></div>
            </div>
          </div>
        </section>

        <section id="projectReportView" class="summary-panel hidden">
          <div class="person-summary-toolbar">
            <label>
              <span>Period</span>
              <select id="projectReportPeriod">
                <option value="week">Weekly</option>
                <option value="month">Monthly</option>
                <option value="year">Yearly</option>
                <option value="custom">Date range</option>
              </select>
            </label>
            <label>
              <span>From</span>
              <input id="projectReportStart" type="date">
            </label>
            <label>
              <span>To</span>
              <input id="projectReportEnd" type="date">
            </label>
            <label>
              <span>Role</span>
              <select id="projectReportRole">
                <option value="All">All</option>
                <option value="Func">Functional</option>
                <option value="Abap">ABAP</option>
              </select>
            </label>
            <label class="wide-filter">
              <span>Projects</span>
              <div class="project-picker" id="projectReportProjectPicker">
                <button id="projectReportProjectToggle" class="project-picker-toggle" type="button">All projects</button>
                <div id="projectReportProjectMenu" class="project-picker-menu hidden">
                  <input id="projectReportProjectSearch" type="search" placeholder="Search project">
                  <div class="project-picker-actions">
                    <button id="projectReportSelectAll" type="button">Select all</button>
                    <button id="projectReportClearProjects" type="button">Clear</button>
                  </div>
                  <div id="projectReportProjects" class="project-options"></div>
                </div>
              </div>
            </label>
          </div>

          <div class="person-summary-layout">
            <div class="pie-card">
              <div id="projectReportPie" class="pie-chart"></div>
              <div>
                <p class="eyebrow" id="projectReportMeta"></p>
                <h3>Project Time Report</h3>
                <p id="projectReportTotal" class="summary-total"></p>
              </div>
            </div>
            <div>
              <h3>Project Distribution</h3>
              <div id="projectReportLegend" class="pie-legend"></div>
            </div>
          </div>
        </section>

        <section id="orgView" class="summary-panel hidden">
          <div class="org-header">
            <div>
              <p class="eyebrow">Organization</p>
              <h3>Reporting Lines</h3>
            </div>
            <div class="org-header-actions">
              <button id="orgAddButton" type="button">Takım üyelerini ekle</button>
              <button id="orgManageButton" type="button">Manage users</button>
            </div>
          </div>
          <div id="orgChart" class="org-chart"></div>
        </section>
      </main>
    </div>

    <div id="projectModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-card">
        <button id="modalClose" class="modal-close" type="button" title="Close">x</button>
        <p id="modalMeta" class="eyebrow"></p>
        <h3 id="modalTitle"></h3>
        <div id="modalBody"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
